<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle with Gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9333EA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="codeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A78BFA;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main Circle Background -->
  <circle cx="100" cy="100" r="95" fill="url(#bgGradient)"/>
  
  <!-- Code Brackets -->
  <path d="M 60 70 L 45 100 L 60 130" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M 140 70 L 155 100 L 140 130" stroke="white" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <!-- Book/Story Symbol -->
  <rect x="75" y="85" width="50" height="35" rx="3" fill="white" opacity="0.9"/>
  <line x1="100" y1="85" x2="100" y2="120" stroke="url(#bgGradient)" stroke-width="2"/>
  <line x1="85" y1="95" x2="95" y2="95" stroke="url(#bgGradient)" stroke-width="2" stroke-linecap="round"/>
  <line x1="105" y1="95" x2="115" y2="95" stroke="url(#bgGradient)" stroke-width="2" stroke-linecap="round"/>
  <line x1="85" y1="105" x2="95" y2="105" stroke="url(#bgGradient)" stroke-width="2" stroke-linecap="round"/>
  <line x1="105" y1="105" x2="115" y2="105" stroke="url(#bgGradient)" stroke-width="2" stroke-linecap="round"/>
  <line x1="85" y1="110" x2="95" y2="110" stroke="url(#bgGradient)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="105" y1="110" x2="115" y2="110" stroke="url(#bgGradient)" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Decorative Dots -->
  <circle cx="100" cy="50" r="4" fill="white" opacity="0.8"/>
  <circle cx="100" cy="150" r="4" fill="white" opacity="0.8"/>
  <circle cx="50" cy="100" r="3" fill="white" opacity="0.6"/>
  <circle cx="150" cy="100" r="3" fill="white" opacity="0.6"/>
</svg>
